<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="../style/estiloLoginCadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">
</head>

<body>
    <div class="containerPagina">
        <div class="painelLogo">
            <img src="../assets/img/HoustonEducationLogo.png" alt="logo Houston Education">
        </div>
        
        <div id="dadosCadastro">
            <form id="cadastroForm">
                <h1>Crie sua Conta!</h1>
                <div class="inputDados">
                    <input type="text" name="nome" placeholder="Nome">
                </div>
                <div class="inputDados">
                    <input type="number" name="matricula" placeholder="Matrícula">
                </div>
                <div class="inputDados">
                    <input type="email" name="email" placeholder="Email">
                </div>
                <div class="inputDados">
                    <input type="password" name="senha" placeholder="Senha">
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <p>Já tem uma conta? <a href="login.html">Faça seu login!</a></p>
            <div id="mensagem"></div>
        </div>
    </div>


    <script src="../scripts/validation/validationCadastro.js"></script>
</body>

</html>
