<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../style/estiloLoginCadastro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">
</head>

<body>
    <div class="containerPagina">
        <div class="painelLogo">
            <img src="../assets/img/HoustonEducationLogo.png" alt="logo Houston Education">
        </div>
        <div id="dadosLogin">
            <form id="loginForm">
                <h1>Login!</h1>

                <div class="inputDados">
                    <input type="email" name="email" placeholder="Email">
                </div>

                <div class="inputDados">
                    <input type="password" name="senha" placeholder="Senha">
                </div>

                <p>
                    <label><input type="checkbox" name="lembrarConta"> Lembrar Conta?</label>
                    <a href="#">Esqueceu a Senha?</a>
                </p>

                <button type="submit">Login</button>
            </form>
            <p>Não Possui Conta? <a href="../pages/cadastro.html">Cadastre-se!</a></p>
            <div id="mensagem">
            </div>
        </div>
    </div>

    <script src="../scripts/validation/validationLogin.js"></script>
</body>

</html>
