<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Monitoria</title>
    <link rel="stylesheet" href="../style/estiloCadastrarMonitoria.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>

<body>
    <script type="module">
        import { parseJwt } from "../scripts/utils/parseJWT.js";

        const user = parseJwt(localStorage.getItem('token'));

        if (user.perfil !== "MONITOR" && user.perfil !== "ADMIN") {
            window.location.href = "naoAutorizado.html";
        }
    </script> <!--evitar do cara clicar com o botão direito e abrir-->

    <h1>Cadastrar Monitoria</h1>

    <form id="monitoriaForm">
        <div class="campoForm">
            <label>Nome da monitoria</label>
            <input type="text" name="nome_monitoria" placeholder="Ex: Monitoria de Cálculo I">
        </div>

        <div class="campoForm">
            <label>Data da monitoria</label>
            <input type="text" class="datepicker" name="data" placeholder="Selecione a data...">
        </div>

        <div class="campoForm">
            <label>Hora de início</label>
            <input type="text" class="timepicker" name="hora_inicio" placeholder="Selecione o horário...">
        </div>

        <div class="campoForm">
            <label>Hora de fim</label>
            <input type="text" class="timepicker" name="hora_fim" placeholder="Selecione o horário...">
        </div>

        <div class="campoForm">
            <label>Local da monitoria</label>
            <input type="text" name="local" placeholder="Ex: Sala 101">
        </div>

        <div class="campoForm">
            <label>Selecione uma disciplina</label>
            <select name="disciplinaId" id="disciplinas">
                <option value="" disabled selected>Selecione...</option>
            </select>
        </div>

        <div class="campoForm">
            <label>Selecione um(a) monitor(a)</label>
            <select name="monitorId" id="monitores">
                <option value="" disabled selected>Selecione...</option>
            </select>
        </div>

        <button type="submit" id="botaoCriarMonitoria">Cadastrar Monitoria</button>
        <div id="mensagem"></div>
    </form>


    <script src="../scripts/disciplinas/carregarDisciplinas.js" type="module"></script>
    <script src="../scripts/monitores/carregarMonitores.js" type="module"></script>
    <script src="../scripts/monitorias/cadastrarMonitorias.js" type="module"></script>

    <script> 
        // Ativa o calendário para o campo de data
        flatpickr(".datepicker", {
            dateFormat: "Y-m-d", // lembrar de altear para o formato americado e colocar o traço pra não dar erro no schema

            "locale": {
                "firstDayOfWeek": 1, 
                "weekdays": {
                    "shorthand": ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"],
                    "longhand": ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"]
                },
                "months": {
                    "shorthand": ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"],
                    "longhand": ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"]
                }
            }
        });

        // Ativa o relógio para os campos de hora
        flatpickr(".timepicker", {
            enableTime: true,   // Habilita a seleção de hora
            noCalendar: true,   // Esconde o calendário
            dateFormat: "H:i",  // Formato 24h (ex: 14:30)
            time_24hr: true     // Força o modo 24h
        });
    </script>
</body>

</html>
