<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houston Education</title>
    <link rel="stylesheet" href="../style/style.css">
    <link rel="stylesheet" href="../style/stylePopUp.css">
    <link rel="shortcut icon" href="../assets/img/iconeHoustonEducation.ico" type="image/x-icon">
</head>

<body>
    <nav>
        <div class="icone iconeMenu">
            <a href="#">
                <img src="../assets/img/iconeMenu.png" alt="icone menu">
            </a>
        </div>
        <div class="logo">
            <a href="home.html">
                <img src="../assets/img/iconeHoustonEducation.ico" alt="logo Houston Education">
            </a>
        </div>
    </nav>



    <aside id="menuLateral" class="menuLateral">
        <div class="menuConteudo">
            <ul>
                <li>
                    <a href="home.html">
                        <img src="../assets/img/iconeHome.png" alt="Icone Home">
                        <span>Home</span>
                    </a>
                </li>
                <li>
                    <a href="cadastrarMonitoria.html" id="linkAdicionarMonitoria">
                        <img src="../assets/img/iconeCadastrarMonitoria.png" alt="Icone Cadastrar Monitoria">
                        <span>Cadastrar Monitoria</span>
                    </a>
                </li>
            </ul>
        </div>
    </aside>

    <div id="overlay" class="overlay-menu"></div>

    <div class="boasvindas">
        <h1>
            Bem vindo, <span class="usuarioNome"></span>!
        </h1>

        <div class="divBuscar">
            <img src="../assets/img/lupa.png" alt="" class="icone-lupa">
            <input type="text" id="buscaMonitoria" placeholder="Buscar monitoria...">
        </div>
    </div>

    <section class="sectionmonitorias">.
        <div class="exibirmonitorias">
            <h2 id="titulomonitorias">Monitorias Disponíveis</h2>
            <ul id="listamonitorias">
                <li>Carregando monitorias...</li>
            </ul>
        </div>
    </section>

    <div id="popupInfoMonitoria" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupTitulo"></h2>
            <p id="popupDisciplina"></p>
            <p id="popupMonitor"></p>
            <p id="popupLocal"></p>
            <p id="popupDataHora"></p>
        </div>
    </div>


    <script type="module" src="../scripts/carregarNomeUsuario.js"></script>
    <script type="module" src="../scripts/monitorias/carregarMonitorias.js"></script>
    <script type="module" src="../scripts/monitorias/autorizadoMonitorias.js"></script>
    <script type="module" src="../scripts/menuLateral/menuLateral.js"></script>

</body>

</html>
