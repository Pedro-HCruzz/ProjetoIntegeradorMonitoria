<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Monitorias</title>
  <style>

    
  .monitorias {
  display: flex;
  gap: 20px;
}

.card {
  border: 1px solid #ccc;
  padding: 20px;
  cursor: pointer;
  width: 200px;
  border-radius: 8px;
  transition: transform 0.2s;
}

.card:hover {
  transform: scale(1.05);
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
}

.popup.hidden {
  display: none;
}

.popup-content {
  background: #fff;
  padding: 30px;
  border-radius: 8px;
  max-width: 400px;
  width: 90%;
  position: relative;
}

.fechar {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-size: 20px;
}

  </style>
</head>
<body>
  <div class="monitorias">
  <div class="card" data-titulo="Monitoria de JavaScript" data-descricao="Aprenda JS do zero ao avançado.">
    <h3>Monitoria de JavaScript</h3>
    <p>Clique para mais detalhes</p>
  </div>

  <div class="card" data-titulo="Monitoria de React" data-descricao="Aprenda a criar apps com React.">
    <h3>Monitoria de React</h3>
    <p>Clique para mais detalhes</p>
  </div>
</div>

<!-- Popup -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <span id="fecharPopup" class="fechar">&times;</span>
    <h2 id="popupTitulo"></h2>
    <p id="popupDescricao"></p>
  </div>
</div>

</body>

  <script>
    const cards = document.querySelectorAll('.card');
    const popup = document.getElementById('popup');
    const popupTitulo = document.getElementById('popupTitulo');
    const popupDescricao = document.getElementById('popupDescricao');
    const fecharPopup = document.getElementById('fecharPopup');

    cards.forEach(card => {
      card.addEventListener('click', () => {
        popupTitulo.textContent = card.dataset.titulo;
        popupDescricao.textContent = card.dataset.descricao;
        popup.classList.remove('hidden');
      });
    });

    fecharPopup.addEventListener('click', () => {
      popup.classList.add('hidden');
    });

    popup.addEventListener('click', (e) => {
      if (e.target === popup) { // fechar clicando fora do conteúdo
        popup.classList.add('hidden');
      }
    });

  </script>
</html>
