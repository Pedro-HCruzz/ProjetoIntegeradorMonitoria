<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style/style.css">
    <link rel="stylesheet" href="./style/stylePopUp.css">
</head>
<body>
    <div class="boasvindas">
        <h1>
            Bem vindo, <span id="usuarioNome"></span>!
        </h1>

        <div class="divBuscar">
            <img src="assets/img/lupa.png" alt="" class="icone-lupa">
            <input type="text" id="buscaMonitoria" placeholder="Buscar monitoria...">
        </div>

        <img src="assets/img/user.png" class="icone-perfil">
    </div>

    <section class="sectionmonitorias">.
        <div class="exibirmonitorias">
            <h2 id="titulomonitorias">Monitorias Disponíveis</h2>
                <ul id="listamonitorias">
                    <li>Carregando monitorias...</li>
                </ul>
        </div>
    </section>

    <div id="popupInfoMonitoria" class="popup hidden">
        <div class="popup-content">
            <h2 id="popupTitulo"></h2>
            <p id="popupDisciplina"></p>
            <p id="popupMonitor"></p>
            <p id="popupLocal"></p>
            <p id="popupDataHora"></p>
        </div>
    </div>
</body>
</html>
